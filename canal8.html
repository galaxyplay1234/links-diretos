<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clapper Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  font-family:system-ui;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.player{
  width:100%;
  max-width:900px;
  aspect-ratio:16/9;
  background:#000;
  position:relative;
  overflow:hidden;
}

video{
  width:100%;
  height:100%;
  background:#000;
}

/* overlay escuro suave */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.6),transparent 40%);
  opacity:0;
  transition:.3s;
}

/* controles */
.controls{
  position:absolute;
  bottom:15px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:15px;
  opacity:0;
  transition:.3s;
}

.btn{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.15);
  color:#fff;
  font-size:18px;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:.2s;
}
.btn:hover{
  background:rgba(255,255,255,.3);
}

/* badge live */
.live{
  position:absolute;
  top:15px;
  left:15px;
  background:#ff0033;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  color:#fff;
}

/* loader */
.loader{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:55px;
  height:55px;
  border:4px solid rgba(255,255,255,.2);
  border-top:4px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:translate(-50%,-50%) rotate(360deg)}
}

.show .overlay,
.show .controls{
  opacity:1;
}

.fullscreen{
  position:fixed !important;
  inset:0 !important;
  width:100vw !important;
  height:100vh !important;
  max-width:100vw !important;
  z-index:9999;
}
</style>
</head>
<body>

<div class="player" id="player">
  <video id="video" playsinline webkit-playsinline></video>

  <div class="live">LIVE</div>
  <div class="loader" id="loader"></div>
  <div class="overlay"></div>

  <div class="controls">
    <button class="btn" id="playBtn">▶</button>
    <button class="btn" id="muteBtn">🔊</button>
    <button class="btn" id="fsBtn">⛶</button>
  </div>
</div>

<script>
const streamURL = "https://xn---22--11--33--88--75---------b25zjf3lta6mwf6a47dza94e.xn----------------g34l3fkcn6n2hmd3acobj33ac2a7a8lufomma7cf2b1sh.xn---1l1--5o4dxb.xn--pck.xn--zck.xn--0ck.xn--pck.xn--yck.xn-----0b4asja8cbew2b4b0gd0edbjm2jpa1b1e9zva7a0347s4da2797e7qri.xn--1ck2e1b/docs/espn-sd/__playlist.m3u8?sv=34&cc=y&secure_uri=true&nu3zAQc9HC3GbwJq=1771985980-x4kY7YlwmBs4llbZ85URa6Hvh82v5CJUL7gDNaYYtyk%3D";

const video = document.getElementById('video');
const loader = document.getElementById('loader');
const player = document.getElementById('player');
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
const fsBtn = document.getElementById('fsBtn');

let hls;

function initPlayer(){

  if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = streamURL;
    video.play();
  }
  else if(Hls.isSupported()){
    hls = new Hls({liveSyncDuration:5});
    hls.loadSource(streamURL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      video.play();
    });

    hls.on(Hls.Events.ERROR,(event,data)=>{
      if(data.fatal){
        setTimeout(()=>initPlayer(),3000);
      }
    });
  }
}

video.addEventListener("playing",()=>{
  loader.style.display="none";
});

playBtn.onclick=()=>{
  if(video.paused){
    video.play();
    playBtn.textContent="❚❚";
  }else{
    video.pause();
    playBtn.textContent="▶";
  }
};

muteBtn.onclick=()=>{
  video.muted=!video.muted;
  muteBtn.textContent=video.muted?"🔇":"🔊";
};

fsBtn.onclick=()=>{
  player.classList.toggle("fullscreen");
};

/* Mostrar controles ao tocar */
player.addEventListener("click",()=>{
  player.classList.toggle("show");
  setTimeout(()=>{
    player.classList.remove("show");
  },3000);
});

initPlayer();
</script>

</body>
</html>
