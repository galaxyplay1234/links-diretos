<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player HLS</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
video{
  width:100%;
  height:100%;
  max-width:100%;
  background:#000;
}
</style>
</head>
<body>

<video id="video" controls autoplay playsinline webkit-playsinline></video>

<script>
const video = document.getElementById('video');

const streamURL = "https://xn---22--11--33--88--75---------b25zjf3lta6mwf6a47dza94e.xn----------------g34l3fkcn6n2hmd3acobj33ac2a7a8lufomma7cf2b1sh.xn---1l1--5o4dxb.xn--pck.xn--zck.xn--0ck.xn--pck.xn--yck.xn-----0b4asja8cbew2b4b0gd0edbjm2jpa1b1e9zva7a0347s4da2797e7qri.xn--1ck2e1b/docs/espn-sd/__playlist.m3u8?sv=34&cc=y&secure_uri=true&nu3zAQc9HC3GbwJq=1771985980-x4kY7YlwmBs4llbZ85URa6Hvh82v5CJUL7gDNaYYtyk%3D";

if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari / iPhone
    video.src = streamURL;
    video.play();
} else if (Hls.isSupported()) {
    const hls = new Hls({
        maxBufferLength: 30,
        maxMaxBufferLength: 60
    });

    hls.loadSource(streamURL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
    });

    hls.on(Hls.Events.ERROR, function(event, data) {
        console.log("Erro HLS:", data);
    });

} else {
    alert("Navegador não suporta HLS");
}
</script>

</body>
</html>
