<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futanium Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0f111a;
  font-family:system-ui;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.player-container{
  width:100%;
  max-width:1100px;
  aspect-ratio:16/9;
  background:#000;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
video{
  width:100%;
  height:100%;
  background:#000;
}
.top-bar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
  color:#fff;
  font-weight:600;
}
.live-badge{
  background:#e10600;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:6px;
}
.live-dot{
  width:8px;
  height:8px;
  background:#fff;
  border-radius:50%;
  animation:pulse 1s infinite;
}
@keyframes pulse{
  0%{opacity:1}
  50%{opacity:.3}
  100%{opacity:1}
}
.loader{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60px;
  height:60px;
  border:4px solid rgba(255,255,255,.2);
  border-top:4px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  100%{transform:translate(-50%,-50%) rotate(360deg)}
}
.controls-overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}
.btn{
  background:rgba(255,255,255,.15);
  border:none;
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:.2s;
}
.btn:hover{
  background:rgba(255,255,255,.3);
}
.fullscreen{
  position:fixed!important;
  top:0!important;
  left:0!important;
  width:100vw!important;
  height:100vh!important;
  max-width:100vw!important;
  border-radius:0!important;
  z-index:9999!important;
}
.error-msg{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-size:18px;
  text-align:center;
  display:none;
}
</style>
</head>
<body>

<div class="player-container" id="container">

  <video id="video" playsinline webkit-playsinline></video>

  <div class="top-bar">
    <div>ESPN SD</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      AO VIVO
    </div>
  </div>

  <div class="loader" id="loader"></div>

  <div class="controls-overlay">
    <button class="btn" id="playBtn">Play</button>
    <button class="btn" id="muteBtn">Mute</button>
    <button class="btn" id="fsBtn">Tela Cheia</button>
  </div>

  <div class="error-msg" id="errorMsg">
    Erro ao carregar o stream<br>
    Tentando reconectar...
  </div>

</div>

<script>
const streamURL = "https://xn---22--11--33--88--75---------b25zjf3lta6mwf6a47dza94e.xn----------------g34l3fkcn6n2hmd3acobj33ac2a7a8lufomma7cf2b1sh.xn---1l1--5o4dxb.xn--pck.xn--zck.xn--0ck.xn--pck.xn--yck.xn-----0b4asja8cbew2b4b0gd0edbjm2jpa1b1e9zva7a0347s4da2797e7qri.xn--1ck2e1b/docs/espn-sd/__playlist.m3u8?sv=34&cc=y&secure_uri=true&nu3zAQc9HC3GbwJq=1771985980-x4kY7YlwmBs4llbZ85URa6Hvh82v5CJUL7gDNaYYtyk%3D";

const video = document.getElementById('video');
const loader = document.getElementById('loader');
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
const fsBtn = document.getElementById('fsBtn');
const container = document.getElementById('container');
const errorMsg = document.getElementById('errorMsg');

let hls;
let retryCount = 0;

function startStream(){

  loader.style.display="block";
  errorMsg.style.display="none";

  if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = streamURL;
      video.play();
  }
  else if(Hls.isSupported()){
      hls = new Hls({
          maxBufferLength:30,
          maxMaxBufferLength:60,
          liveSyncDuration:5,
      });

      hls.loadSource(streamURL);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED,()=>{
          video.play();
      });

      hls.on(Hls.Events.ERROR,(event,data)=>{
          if(data.fatal){
              retryStream();
          }
      });
  }
}

function retryStream(){
  if(retryCount < 5){
      retryCount++;
      errorMsg.style.display="block";
      setTimeout(()=>{
          startStream();
      },3000);
  } else {
      errorMsg.innerHTML="Stream indisponível";
  }
}

video.addEventListener("playing",()=>{
  loader.style.display="none";
});

playBtn.onclick=()=>{
  if(video.paused){
    video.play();
    playBtn.textContent="Pause";
  }else{
    video.pause();
    playBtn.textContent="Play";
  }
};

muteBtn.onclick=()=>{
  video.muted=!video.muted;
  muteBtn.textContent=video.muted?"Unmute":"Mute";
};

fsBtn.onclick=()=>{
  if(!container.classList.contains("fullscreen")){
    container.classList.add("fullscreen");
  }else{
    container.classList.remove("fullscreen");
  }
};

startStream();
</script>

</body>
</html>
